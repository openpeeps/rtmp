name: test
on:
  push:
    paths-ignore:
      - LICENSE
      - README.*
      - examples
      - .github/workflows
  pull_request:
    paths-ignore:
      - LICENSE
      - README.*
      - examples
      - .github/workflows
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        nim-version:
          - 'stable'
    steps:
      - uses: actions/checkout@v3
      - uses: jiro4989/setup-nim-action@v1
        with:
          nim-version: ${{ matrix.nim-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libssl-dev libevent-dev ca-certificates
          sudo ldconfig

      - name: Build SRS (shallow single-branch clone)
        run: |
          git clone --depth 1 --branch develop --single-branch https://github.com/ossrs/srs.git
          cd srs/trunk
          ./configure
          make -j$(nproc)
          if [ -f /usr/local/lib/libssl.so ] || [ -f /usr/local/lib/libsrs.a ]; then
            sudo ldconfig
          fi

      - name: Debug: verify libs visible
        run: |
          pkg-config --cflags --libs openssl libevent || true
          ldconfig -p | grep -E "libssl|libcrypto|libevent" || true
          ls -l /usr/lib/*/libssl* /usr/local/lib/libssl* || true

      - run: nimble install -Y
      - run: nim c -r src/${{ github.event.repository.name }}.nim
      - run: nimble test